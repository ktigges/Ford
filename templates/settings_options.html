<form method="post" class="card form-card">
  <h2>General Options</h2>
  <label>Display Units:
    <select name="units">
      <option value="imperial" {% if settings.units == 'imperial' %}selected{% endif %}>Imperial (mi, °F)</option>
      <option value="metric" {% if settings.units == 'metric' %}selected{% endif %}>Metric (km, °C)</option>
    </select>
  </label>
  <label>Timezone:
    <input type="text" name="timezone" value="{{ settings.timezone }}" placeholder="America/Chicago">
  </label>
  <label>Log Level:
    <select name="log_level">
      <option value="DEBUG" {% if settings.log_level == 'DEBUG' %}selected{% endif %}>DEBUG</option>
      <option value="INFO" {% if settings.log_level == 'INFO' %}selected{% endif %}>INFO</option>
      <option value="WARNING" {% if settings.log_level == 'WARNING' %}selected{% endif %}>WARNING</option>
      <option value="ERROR" {% if settings.log_level == 'ERROR' %}selected{% endif %}>ERROR</option>
    </select>
  </label>
  <label><input type="checkbox" name="conservative_polling" {% if settings.conservative_polling == 'on' %}checked{% endif %}> Conservative Polling</label>
  <label><input type="checkbox" name="autostart_poller" {% if settings.autostart_poller == 'on' %}checked{% endif %}> Autostart Poller</label>
  <label><input type="checkbox" name="developing" {% if settings.developing == 'on' %}checked{% endif %}> Developing Mode</label>

  <h3>Polling Intervals (seconds)</h3>
  <label>Ignition Off:
    <input type="number" name="poll_interval_off" value="{{ settings.poll_interval_off }}" min="10" max="3600">
  </label>
  <label>Ignition On:
    <input type="number" name="poll_interval_on" value="{{ settings.poll_interval_on }}" min="10" max="3600">
  </label>
  <label>Moving:
    <input type="number" name="poll_interval_moving" value="{{ settings.poll_interval_moving }}" min="5" max="600">
  </label>
  <label>Charging:
    <input type="number" name="poll_interval_charging" value="{{ settings.poll_interval_charging }}" min="10" max="3600">
  </label>

  <button type="submit" name="action" value="save_settings">Save General Options</button>
</form>
