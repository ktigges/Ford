<form method="post" class="card form-card">
  <h2>Scheduled Backups</h2>
  <label><input type="checkbox" name="backup_schedule_enabled" {% if settings.backup_schedule_enabled == 'on' %}checked{% endif %}> Enable Scheduled Backups</label>
  <label>Interval (hours):
    <input type="number" name="backup_schedule_hours" value="{{ settings.backup_schedule_hours }}" min="1" max="168">
  </label>
  <button type="submit" name="action" value="save_backup_schedule">Save Backup Schedule</button>
</form>

<div class="card" style="margin-top:2rem;">
  <h3>Last Backup Info</h3>
  <ul>
    <li>Last Completed: {{ settings.backup_last_completed_at }}</li>
    <li>Last Error: {{ settings.backup_last_error }}</li>
  </ul>
</div>
